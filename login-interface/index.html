<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiTalent - Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="logo_horizontal.svg" alt="CertiTalent Logo">
            </div>
            <h1>Iniciar sesión</h1>
            <p class="subtitle">Bienvenido de nuevo. Ingresa tus credenciales para continuar.</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Contraseña</label>
                        <a href="recovery.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" id="password" placeholder="Tu contraseña" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Recordarme
                    </label>
                </div>

                <div id="error-message" class="error-message hidden">
                    Correo electrónico o contraseña incorrectos. Por favor, intenta de nuevo.
                </div>

                <button type="submit" id="login-btn" class="login-btn">
                    <span class="btn-text">Iniciar sesión</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>

            <div class="separator">
                <span>o accede con</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn google-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"
                        width="20">
                    Continuar con Google
                </button>
                <button type="button" class="social-btn microsoft-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft"
                        width="18">
                    Continuar con Microsoft
                </button>
            </div>

            <div class="footer">
                ¿No tienes una cuenta? <a href="#">Contactar a soporte</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = loginBtn.querySelector('.btn-text');
        const spinner = loginBtn.querySelector('.spinner');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Estado de carga para el botón primario
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            loginBtn.disabled = true;
            errorMessage.classList.add('hidden');

            // Simular validación
            setTimeout(() => {
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
                loginBtn.disabled = false;
                errorMessage.classList.remove('hidden');
            }, 1500);
        });
    </script>
</body>

</html>
